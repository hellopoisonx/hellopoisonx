name: Update README Stats Cards

on:
  schedule:
    # 每天凌晨 3:00 (UTC) 自动运行一次
    - cron: "0 3 * * *"
  # 允许在 Actions 页面手动点击触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. 检出当前仓库代码
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      # 2. 调用社区封装好的 Go 语言版 github-readme-stats 生成静态 SVG
      - name: Generate Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          # 在这里配置你的参数，比如主题、是否显示图标
          options: username=hellopoisonx&show_icons=true&theme=tokyonight
          path: profile/stats.svg
          token: ${{ secrets.PAT_TOKEN }}

      - name: Generate Top Languages Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=hellopoisonx&layout=compact&theme=tokyonight
          path: profile/top-langs.svg
          token: ${{ secrets.PAT_TOKEN }}

      # 3. 将生成的静态图片提交并推送到你的仓库
      - name: Commit and Push Cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          # 如果图片内容没有变化，跳过 commit 避免报错
          git commit -m "chore: update github readme stats cards" || exit 0
          git push
